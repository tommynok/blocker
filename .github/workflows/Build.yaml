name: Build Release ARM8
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: "Build ARM8 Release APK"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21 

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write sign info
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            echo releaseStorePassword='${{ secrets.SIGNING_STORE_PASSWORD }}' >> gradle.properties
            echo releaseKeyAlias='${{ secrets.SIGNING_KEY_ALIAS }}' >> gradle.properties
            echo releaseKeyPassword='${{ secrets.SIGNING_KEY_PASSWORD }}' >> gradle.properties
            echo ${{ secrets.KEYSTORE }} | base64 --decode > key.jks
            echo releaseStoreFile='${{ github.workspace }}/key.jks' >> gradle.properties
          fi

      - name: Build ARM8 Release
        # Чистим перед сборкой и собираем только одну архитектуру
        run: ./gradlew clean :app-compose:assembleFossRelease -Pandroid.injected.abi.list=arm64-v8a

      - name: Upload ARM8 APK
        uses: actions/upload-artifact@v4
        with:
          name: Blocker-ARM8-Release
          path: '**/build/outputs/apk/foss/release/*.apk'
